name: prioritask
description: "PrioriTask"

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  #Other fonts library
  google_fonts: ^8.1.0

  #Other Libraries Used for this project
  cupertino_icons: ^1.0.8
  flutter_rating_bar: ^4.0.1
  table_calendar: ^3.1.2
  flutter_svg: ^2.0.10+1
  popover: ^0.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:

  uses-material-design: true


  assets:
    - assets/

  # To add custom fonts to your application, add a fonts section here,
